kind = "data-app"
previewPath = "/"
title = "منصة تحليل بنود الأعمال الإنشائية"
version = "1.0.0"
id = "artifacts/boq-analytics"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22631

[services.development]
run = "pnpm --filter @workspace/boq-analytics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/boq-analytics", "run", "build" ]
publicDir = "artifacts/boq-analytics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22631"
BASE_PATH = "/"
